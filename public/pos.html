<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kasir POS | Dapur Senja</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles.css">
    <style>
        :root {
            --pos-bg: #f1f2f6;
            --pos-accent: #9d4528;
            --pos-sidebar: #ffffff;
        }

        body.pos-page {
            background: var(--pos-bg);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-columns: 1fr 380px;
        }

        /* Menu Grid */
        .pos-menu-area {
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .pos-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 1rem 1.5rem;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
        }

        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .cat-tab {
            padding: 10px 20px;
            background: white;
            border-radius: 12px;
            white-space: nowrap;
            cursor: pointer;
            font-weight: 500;
            color: #636e72;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .cat-tab.active {
            background: var(--pos-accent);
            color: white;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.2rem;
        }

        .pos-item-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.2s;
            border: 2px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .pos-item-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .pos-item-card.selected {
            border-color: var(--pos-accent);
        }

        .item-img {
            aspect-ratio: 1/1;
            background: #eee;
            position: relative;
        }

        .item-price-tag {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .item-info {
            padding: 12px;
            text-align: center;
        }

        .item-info h4 { margin: 0; font-size: 0.95rem; }

        /* Cart Sidebar */
        .pos-sidebar {
            background: var(--pos-sidebar);
            border-left: 1px solid #dfe6e9;
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            box-shadow: -10px 0 30px rgba(0,0,0,0.02);
        }

        .cart-title {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid #f1f2f6;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .qty-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: 1px solid #dfe6e9;
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cart-summary {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 20px;
            margin-bottom: 1.5rem;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .total-row {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ccc;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--pos-accent);
        }

        .btn-checkout {
            background: var(--pos-accent);
            color: white;
            width: 100%;
            padding: 1.2rem;
            border-radius: 16px;
            border: none;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 25px rgba(157, 69, 40, 0.2);
        }

        .btn-checkout:hover {
            background: #823921;
        }

        /* Login Overlay */
        .login-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #f1f2f6;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Responsive */
        @media (max-width: 900px) {
            body.pos-page { grid-template-columns: 1fr; }
            .pos-sidebar {
                position: fixed;
                right: -100%;
                top: 0;
                height: 100%;
                width: 320px;
                transition: 0.3s;
                z-index: 50;
            }
            body.show-cart .pos-sidebar { right: 0; }
        }
    </style>
</head>
<body class="pos-page">
    <div id="loginOverlay" class="login-overlay">
        <div style="background: white; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); width: 350px;">
            <h2 style="text-align: center; margin-bottom: 1.5rem;">Kasir Login</h2>
            <form id="loginForm">
                <div style="margin-bottom: 1rem;">
                    <label style="display: block; margin-bottom: 5px;">Username</label>
                    <input type="text" name="username" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;" value="yogyakarta" required>
                </div>
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; margin-bottom: 5px;">Password</label>
                    <input type="password" name="password" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ddd;" value="owner123" required>
                </div>
                <button type="submit" style="width: 100%; padding: 12px; background: var(--pos-accent); color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;">Masuk</button>
            </form>
            <p id="loginError" style="color: red; margin-top: 1rem; text-align: center;"></p>
        </div>
    </div>

    <div class="pos-menu-area">
        <div class="pos-header">
            <div>
                <h2 id="outletName">Dapur Senja POS</h2>
                <p id="cashierName" style="color: #636e72; font-size: 0.9rem;">Kasir: -</p>
            </div>
            <div class="category-tabs" id="categoryTabs">
                <div class="cat-tab active" data-cat="all">Semua</div>
                <div class="cat-tab" data-cat="Makanan Utama">Makanan</div>
                <div class="cat-tab" data-cat="Minuman">Minuman</div>
                <div class="cat-tab" data-cat="Camilan">Camilan</div>
            </div>
        </div>

        <div class="menu-grid" id="menuGrid">
            <!-- Items will be loaded here -->
        </div>
    </div>

    <aside class="pos-sidebar">
        <div class="cart-title">
            <span>Pesanan Baru</span>
            <button onclick="clearCart()" style="border: none; background: none; color: #ff7675; cursor: pointer; font-size: 0.9rem;">Hapus Semua</button>
        </div>

        <div style="margin-bottom: 1rem;">
            <input type="text" id="custName" placeholder="Nama Pelanggan" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #dfe6e9;">
        </div>

        <div class="cart-items" id="cartItems">
            <!-- Cart items will be loaded here -->
            <div style="text-align: center; color: #b2bec3; margin-top: 3rem;">Keranjang Kosong</div>
        </div>

        <div class="cart-summary">
            <div class="summary-row">
                <span>Subtotal</span>
                <span id="subtotal">Rp0</span>
            </div>
            <div class="summary-row">
                <span>Pajak (10%)</span>
                <span id="tax">Rp0</span>
            </div>
            <div class="summary-row total-row">
                <span>Total</span>
                <span id="total">Rp0</span>
            </div>
        </div>

        <button class="btn-checkout" onclick="handleCheckout()">Proses Pembayaran</button>
        <button onclick="logout()" style="margin-top: 10px; border: none; background: none; color: #636e72; cursor: pointer; width: 100%;">Keluar</button>
    </aside>

    <!-- Success Modal -->
    <div id="successModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 2000; align-items: center; justify-content: center;">
        <div style="background: white; padding: 3rem; border-radius: 24px; text-align: center; width: 400px;">
            <div style="font-size: 4rem; margin-bottom: 1rem;">✅</div>
            <h2>Pesanan Berhasil!</h2>
            <p id="invoiceInfo" style="margin: 1rem 0; color: #636e72;"></p>
            <button class="btn-checkout" onclick="window.location.reload()">Selesai & Pesanan Baru</button>
        </div>
    </div>

    <script src="/pos.js"></script>
</body>
</html>
